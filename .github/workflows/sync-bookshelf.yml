name: 📚 同步书架

on:
  push:
    branches: [main]
    paths:
      - 'books/**'
      - 'update-books.sh'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 更新 books.json
        run: |
          chmod +x update-books.sh
          ./update-books.sh

      - name: 📝 提交变更（如有）
        run: |
          if ! git diff --quiet books.json; then
            git config user.name "bookshelf-bot"
            git config user.email "bot@bookshelf"
            git add books.json
            git commit -m "🔄 自动同步 books.json"
            git push
            echo "✅ books.json 已更新"
          else
            echo "✅ books.json 已是最新"
          fi

      - name: ⚡ 触发 Pages 重新部署
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages/deployments" \
            -d '{}' || echo "⚠️ Pages deploy trigger skipped (may not be supported)"
